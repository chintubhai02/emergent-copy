<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Nidhi ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="fireworks"></canvas>

<div id="stars"></div>

<div class="overlay"></div>

<section class="hero">

<h2 class="welcome">A Special Surprise...</h2>

<h1 id="typing"></h1>

<p class="subtitle">
Every firework in the sky carries a wish for you.
</p>

<button id="startBtn">
Start The Surprise ❤️
</button>

</section>

<section class="countdown">

<h2>Countdown</h2>

<div id="timer">

<div><span id="days">00</span><small>Days</small></div>

<div><span id="hours">00</span><small>Hours</small></div>

<div><span id="minutes">00</span><small>Minutes</small></div>

<div><span id="seconds">00</span><small>Seconds</small></div>

</div>

</section>

<section class="gallery">

<h2>Beautiful Memories 📸</h2>

<div class="photos">

<img src="images/photo1.jpg">

<img src="images/photo2.jpg">

<img src="images/photo3.jpg">

<img src="images/photo4.jpg">

<img src="images/photo5.jpg">

<img src="images/photo6.jpg">

</div>

</section>

<section class="letter">

<h2>A Letter For You ❤️</h2>

<p id="letterText">

Write your birthday message here...

</p>

</section>

<section class="final">

<h1>

Happy Birthday Nidhi ❤️

</h1>

<p>

May every dream of yours come true.

</p>

</section>

<button id="musicBtn">

🎵

</button>

<audio id="music" loop>

<source src="music.mp3" type="audio/mp3">

</audio>

<script src="script.js"></script>

</body>

</html>
